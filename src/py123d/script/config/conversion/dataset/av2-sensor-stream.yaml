# Streaming variant of dataset=av2-sensor — downloads selected logs from S3 into a
# managed temp directory at parser construction time, converts, and cleans up on
# parser GC.
#
# The AV2 S3 bucket is publicly readable (anonymous access via botocore.UNSIGNED);
# no AWS credentials are required. Each log is ~250 MB, so even small num_logs values
# imply multi-hundred-MB of download traffic.
#
# Usage:
#   py123d-conversion dataset=av2-sensor-stream dataset.parser.downloader.num_logs=1
#   py123d-conversion dataset=av2-sensor-stream \
#     'dataset.parser.downloader.log_ids={av2-sensor_val: [00a6ffc1-6ce9-3bc3-a060-6006e9893a1a]}'

parser:
  _target_: py123d.parser.av2.av2_sensor_parser.Av2SensorParser
  _convert_: 'all'

  splits: ["av2-sensor_train", "av2-sensor_val", "av2-sensor_test"]

  # Ignored — the downloader materializes logs into a temp dir; the parser uses
  # `<temp_dir>/sensor` as the sensor root.
  av2_sensor_root: null
  lidar_camera_matching: "sweep"

  downloader:
    _target_: py123d.parser.av2.av2_download.Av2Downloader
    _convert_: 'all'

    # null → parser assigns a tempfile.TemporaryDirectory for the duration of the run.
    # Set to a persistent path to reuse downloads across runs.
    output_dir: null

    variant: sensor           # currently the only supported AV2 variant

    # splits is bound to parser.splits so the downloader and parser stay in lockstep.
    splits: ${dataset.parser.splits}

    num_logs: null            # first N per split, or N random if sample_random=true
    log_ids: null             # e.g. {av2-sensor_val: [00a6ffc1-6ce9-3bc3-a060-6006e9893a1a]}
    sample_random: false
    seed: 0

    max_workers: 16
    overwrite: false
    dry_run: false

log_writer_config:
  _target_: py123d.api.scene.arrow.utils.log_writer_config.LogWriterConfig
  _convert_: 'all'

  force_log_conversion: ${force_log_conversion}
  force_map_conversion: ${force_map_conversion}
  async_conversion: ${async_conversion}

  # Streaming forces self-contained payloads. Do NOT switch to "path" — the source
  # files under the temp directory are deleted when the parser is garbage collected,
  # which would leave the Arrow logs pointing at a vanished source.
  camera_store_option: "jpeg_binary" # "jpeg_binary", "png_binary", "mp4" — "path" forbidden here
  lidar_store_option: "binary"       # "binary" — "path" forbidden here
  lidar_codec: "ipc_zstd"                 # None or "laz", "draco", "ipc_zstd", "ipc_lz4", "ipc"

  infer_ego_dynamics: true
  infer_box_dynamics: true

log_writer:
  _target_: py123d.api.scene.arrow.arrow_log_writer.ArrowLogWriter
  _convert_: 'all'
  log_writer_config: ${dataset.log_writer_config}
  logs_root: ${dataset_paths.py123d_logs_root}
  sensors_root: ${dataset_paths.py123d_sensors_root}
  ipc_compression: null
  ipc_compression_level: null

  sync_config:
    _target_: py123d.api.scene.arrow.arrow_log_writer.SyncConfig
    _convert_: 'all'
    reference_column: lidar.lidar_merged.timestamp_us
    direction: "forward" # "forward" or "backward"

map_writer:
  _target_: py123d.api.map.arrow.arrow_map_writer.ArrowMapWriter
  _convert_: 'all'
  force_map_conversion: ${force_map_conversion}
  maps_root: ${dataset_paths.py123d_maps_root}
  logs_root: ${dataset_paths.py123d_logs_root}
